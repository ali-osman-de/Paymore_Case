<div class="flex min-h-[85vh] items-center justify-center bg-slate-50 px-4">

  <div class="w-full max-w-sm rounded-xl bg-white p-8 shadow-md">

    <h1 class="mb-6 text-center text-2xl font-bold text-slate-800">
      Paymore Admin Login
    </h1>

    <div class="space-y-4">

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Username
        </label>
        <input
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          type="text"
          name="username"
          id="username"
          placeholder="Enter username"
          (keyup)="cacthUserName($event)"
        />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">
          Password
        </label>
        <input
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          type="password"
          name="password"
          id="password"
          placeholder="••••••••"
          (keyup)="cacthPassword($event)"
        />
      </div>

      <p class="text-sm text-slate-500">
        {{ username }} - {{ password }}
      </p>

      <button
        class="w-full rounded-lg bg-indigo-600 py-2 text-sm font-semibold text-white transition hover:bg-indigo-700 active:scale-[0.99]"
        type="submit"
        (click)="handleSubmit(username, password)"
      >
        Giriş
      </button>

    </div>

  </div>

</div>
