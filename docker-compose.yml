services:
  web:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200 --poll 2000"

  api:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    command: sh -c "npx json-server paymore-case.json --host 0.0.0.0 --port 3000"